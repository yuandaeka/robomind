<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adu Cepat Hitung</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3e5f5; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .header { text-align: center; margin-bottom: 20px; z-index: 10;}
        h1 { color: #8e24aa; margin: 0; }
        p { color: #666; margin: 5px 0; font-weight: bold; }
        .game-board { display: flex; width: 90%; max-width: 800px; height: 60vh; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .player { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        .player1 { background-color: #bbdefb; border-right: 4px solid #fff; }
        .player2 { background-color: #ffcdd2; }
        .score { font-size: 3rem; font-weight: bold; position: absolute; top: 20px; }
        .player1 .score { color: #1565c0; }
        .player2 .score { color: #c62828; }
        .question { font-size: 2.5rem; font-weight: bold; margin: 20px 0; color: #333; }
        .answer-input { font-size: 2rem; width: 120px; text-align: center; padding: 10px; border-radius: 10px; border: none; outline: none; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        .controls { margin-top: 10px; color: #555; font-size: 0.9rem; }
        #winner { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; font-size: 3rem; font-weight: bold; display: none; }
        .back-btn { margin-top: 30px; background-color: #8e24aa; display: inline-block; text-decoration: none; padding: 10px 20px; color: white; border-radius: 5px; z-index: 10;}
    </style>
</head>
<body>
    <div class="header">
        <h1>Adu Cepat Hitung</h1>
        <p>Siapa yang mencapai skor 5 duluan, dia menang!</p>
    </div>

    <div class="game-board">
        <div class="player player1">
            <div class="score" id="score1">0</div>
            <h2>Pemain 1 (Kiri)</h2>
            <div class="question" id="q1">?</div>
            <input type="number" id="ans1" class="answer-input" autocomplete="off">
            <div class="controls">Ketik angka lalu tekan 'A'</div>
        </div>
        <div class="player player2">
            <div class="score" id="score2">0</div>
            <h2>Pemain 2 (Kanan)</h2>
            <div class="question" id="q2">?</div>
            <input type="number" id="ans2" class="answer-input" autocomplete="off">
            <div class="controls">Ketik angka lalu tekan 'L'</div>
        </div>
    </div>
    
    <a href="/games" class="back-btn">Kembali ke Fitur Game</a>

    <div id="winner">
        <span id="winnerText">Pemain X Menang!</span>
        <button onclick="location.reload()" style="margin-top:20px; padding:15px 30px; font-size:1.5rem; cursor:pointer; background:#ffeb3b; border:none; border-radius:10px; font-weight:bold;">Main Lagi</button>
    </div>

    <script>
        let p1Score = 0;
        let p2Score = 0;
        let p1Ans = 0;
        let p2Ans = 0;

        function genQ(player) {
            let num1 = Math.floor(Math.random() * 10) + 1;
            let num2 = Math.floor(Math.random() * 10) + 1;
            let ops = ['+', '-'];
            let op = ops[Math.floor(Math.random() * ops.length)];
            
            if (op === '-' && num1 < num2) {
                let temp = num1; num1 = num2; num2 = temp;
            }
            
            if (player === 1) {
                document.getElementById('q1').textContent = `${num1} ${op} ${num2}`;
                p1Ans = op === '+' ? num1 + num2 : num1 - num2;
                document.getElementById('ans1').value = '';
            } else {
                document.getElementById('q2').textContent = `${num1} ${op} ${num2}`;
                p2Ans = op === '+' ? num1 + num2 : num1 - num2;
                document.getElementById('ans2').value = '';
            }
        }

        function checkWin() {
            if (p1Score >= 5) {
                document.getElementById('winnerText').textContent = 'Pemain 1 (Kiri) Menang!';
                document.getElementById('winner').style.display = 'flex';
            } else if (p2Score >= 5) {
                document.getElementById('winnerText').textContent = 'Pemain 2 (Kanan) Menang!';
                document.getElementById('winner').style.display = 'flex';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'a') {
                const val = parseInt(document.getElementById('ans1').value);
                if (val === p1Ans) {
                    p1Score++;
                    document.getElementById('score1').textContent = p1Score;
                    genQ(1);
                    checkWin();
                } else {
                    document.getElementById('ans1').value = '';
                }
            } else if (e.key.toLowerCase() === 'l') {
                const val = parseInt(document.getElementById('ans2').value);
                if (val === p2Ans) {
                    p2Score++;
                    document.getElementById('score2').textContent = p2Score;
                    genQ(2);
                    checkWin();
                } else {
                    document.getElementById('ans2').value = '';
                }
            }
        });

        // Initialize
        genQ(1);
        genQ(2);
        
        // Prevent typing A or L in inputs from acting normally
        document.getElementById('ans1').addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'a') e.preventDefault();
        });
        document.getElementById('ans2').addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'l') e.preventDefault();
        });
    </script>
</body>
</html>
