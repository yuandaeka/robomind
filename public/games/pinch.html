<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinch and Drop</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e0f7fa; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .game-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 600px; text-align: center; }
        h1 { color: #00838f; margin-top: 0; }
        .equation { font-size: 3rem; font-weight: bold; margin: 30px 0; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .drop-zone { width: 60px; height: 60px; border: 3px dashed #00bcd4; border-radius: 10px; display: flex; align-items: center; justify-content: center; background-color: #e0f7fa; transition: background 0.3s; }
        .drop-zone.over { background-color: #b2ebf2; border-style: solid; }
        .numbers-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 30px; }
        .number-box { width: 60px; height: 60px; background-color: #00bcd4; color: white; font-size: 2rem; font-weight: bold; display: flex; align-items: center; justify-content: center; border-radius: 10px; cursor: grab; user-select: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .number-box:active { cursor: grabbing; }
        .message { margin-top: 20px; font-size: 1.2rem; font-weight: bold; min-height: 30px; }
        .success { color: #4caf50; }
        .back-btn { margin-top: 30px; background-color: #00838f; display: inline-block; text-decoration: none; padding: 10px 20px; color: white; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Pinch and Drop</h1>
        <p style="color: #666; font-weight: bold;">Tarik angka yang benar ke dalam kotak kosong!</p>
        
        <div class="equation" id="equation">
            <span id="num1">?</span>
            <span id="op">+</span>
            <div class="drop-zone" id="drop-zone"></div>
            <span>=</span>
            <span id="result">?</span>
        </div>

        <div class="message" id="message"></div>

        <div class="numbers-container" id="numbers-container">
            <!-- Numbers generated by JS -->
        </div>

        <a href="/games" class="back-btn">Kembali ke Fitur Game</a>
    </div>

    <script>
        let currentTarget = 0;
        let correctAnswer = 0;

        const dropZone = document.getElementById('drop-zone');
        const messageEl = document.getElementById('message');

        function generateProblem() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const target = Math.floor(Math.random() * 10) + 1; // The missing number
            const op = Math.random() > 0.5 ? '+' : '-';
            
            let result;
            if (op === '+') {
                result = num1 + target;
            } else {
                result = num1 - target;
            }

            correctAnswer = target;

            document.getElementById('num1').textContent = num1;
            document.getElementById('op').textContent = op;
            document.getElementById('result').textContent = result;
            
            dropZone.textContent = '';
            dropZone.style.borderColor = '#00bcd4';
            dropZone.style.backgroundColor = '#e0f7fa';
            messageEl.textContent = '';

            generateDraggables(target);
        }

        function generateDraggables(correctNum) {
            const container = document.getElementById('numbers-container');
            container.innerHTML = '';

            let numbers = [correctNum];
            while(numbers.length < 5) {
                let randomNum = Math.floor(Math.random() * 20);
                if (!numbers.includes(randomNum)) {
                    numbers.push(randomNum);
                }
            }
            
            // Shuffle
            numbers.sort(() => Math.random() - 0.5);

            numbers.forEach(num => {
                const box = document.createElement('div');
                box.className = 'number-box';
                box.draggable = true;
                box.textContent = num;
                box.dataset.value = num;

                box.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', num);
                    box.style.opacity = '0.5';
                });

                box.addEventListener('dragend', (e) => {
                    box.style.opacity = '1';
                });

                container.appendChild(box);
            });
        }

        // Drag and drop events for drop zone
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('over');
        });

        dropZone.addEventListener('dragleave', (e) => {
            dropZone.classList.remove('over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('over');
            
            const draggedValue = parseInt(e.dataTransfer.getData('text/plain'));
            dropZone.textContent = draggedValue;

            if (draggedValue === correctAnswer) {
                dropZone.style.backgroundColor = '#c8e6c9';
                dropZone.style.borderColor = '#4caf50';
                messageEl.textContent = 'HEBAT! Jawabanmu Benar! 🎉';
                messageEl.className = 'message success';
                setTimeout(generateProblem, 2000);
            } else {
                dropZone.style.backgroundColor = '#ffcdd2';
                dropZone.style.borderColor = '#f44336';
                messageEl.textContent = 'Oops! Coba angka yang lain.';
                messageEl.className = 'message';
                messageEl.style.color = '#f44336';
                
                setTimeout(() => {
                    dropZone.textContent = '';
                    dropZone.style.backgroundColor = '#e0f7fa';
                    dropZone.style.borderColor = '#00bcd4';
                    messageEl.textContent = '';
                }, 1500);
            }
        });

        window.onload = generateProblem;
    </script>
</body>
</html>
