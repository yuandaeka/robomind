<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ksatria Angka</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffebee; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .game-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; text-align: center; position: relative; overflow: hidden; }
        .timer-bar { position: absolute; top: 0; left: 0; height: 8px; background-color: #f44336; width: 100%; transition: width 0.1s linear; }
        h1 { color: #c62828; margin-top: 0; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px; color: #666; }
        .question { font-size: 3rem; font-weight: bold; color: #333; margin: 20px 0; }
        input[type="number"] { font-size: 2rem; width: 150px; text-align: center; padding: 10px; border: 3px solid #ccc; border-radius: 10px; outline: none; }
        input[type="number"]:focus { border-color: #f44336; }
        .feedback { min-height: 25px; margin-top: 15px; font-weight: bold; color: #f44336; }
        .back-btn { margin-top: 20px; background-color: #95a5a6; display: inline-block; text-decoration: none; padding: 10px 20px; color: white; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="timer-bar" id="timer-bar"></div>
        <h1>Ksatria Angka</h1>
        <div class="stats">
            <div>Skor: <span id="score">0</span></div>
            <div>Level: <span id="level">1</span></div>
        </div>
        <div class="question" id="question">5 + 5 = ?</div>
        <input type="number" id="answer" autocomplete="off" placeholder="Jawaban">
        <div class="feedback" id="feedback"></div>
        <div id="game-over" style="display:none;">
            <h2 style="color:#c62828;">WAKTU HABIS!</h2>
            <button onclick="startGame()" style="padding:10px 20px; font-size:1rem; cursor:pointer; background:#f44336; color:white; border:none; border-radius:5px;">Main Lagi</button>
        </div>
        <br>
        <a href="/games" class="back-btn">Kembali ke Fitur Game</a>
    </div>

    <script>
        let score = 0;
        let level = 1;
        let currentAnswer = 0;
        let timeLeft = 100; // 100% width
        let timerInterval;
        let timeSpeed = 0.5;

        const answerInput = document.getElementById('answer');
        const timerBar = document.getElementById('timer-bar');

        function generateQuestion() {
            let num1, num2, operator;
            const ops = ['+', '-'];
            operator = ops[Math.floor(Math.random() * ops.length)];
            
            let maxNum = 10 + (level * 5);
            num1 = Math.floor(Math.random() * maxNum) + 1;
            num2 = Math.floor(Math.random() * maxNum) + 1;

            if (operator === '-') {
                if (num1 < num2) {
                    let temp = num1; num1 = num2; num2 = temp;
                }
                currentAnswer = num1 - num2;
            } else {
                currentAnswer = num1 + num2;
            }

            document.getElementById('question').textContent = `${num1} ${operator} ${num2} = ?`;
            answerInput.value = '';
            answerInput.focus();
        }

        function startGame() {
            score = 0;
            level = 1;
            timeSpeed = 0.5;
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('feedback').textContent = '';
            answerInput.disabled = false;
            
            timeLeft = 100;
            generateQuestion();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= timeSpeed;
                timerBar.style.width = timeLeft + '%';
                
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    gameOver();
                }
            }, 50);
        }

        function gameOver() {
            answerInput.disabled = true;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('question').textContent = 'GAME OVER';
        }

        answerInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                if (parseInt(answerInput.value) === currentAnswer) {
                    score += 10;
                    if (score % 50 === 0) {
                        level++;
                        timeSpeed += 0.2; // Makin cepat
                    }
                    document.getElementById('score').textContent = score;
                    document.getElementById('level').textContent = level;
                    timeLeft = 100; // Reset waktu
                    generateQuestion();
                    document.getElementById('feedback').textContent = '';
                } else {
                    document.getElementById('feedback').textContent = 'Salah! Coba lagi!';
                    answerInput.value = '';
                }
            }
        });

        window.onload = startGame;
    </script>
</body>
</html>
